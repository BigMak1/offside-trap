<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0B1322" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='%230B1322'/><circle cx='8' cy='8' r='5' fill='%23F3F1E2'/></svg>" />
  <link rel="stylesheet" href="assets/font/silkscreen.css?v=20260623" />
  <link rel="stylesheet" href="assets/font/tiny5.css?v=20260623" />
  <link rel="stylesheet" href="styles.css?v=20260623" />
  <title>Offside Trap</title>
</head>
<body>
  <div class="app" id="app">

    <!-- ════════ TITLE ════════ -->
    <section class="screen active" id="screen-title">
      <div class="title-banner">
        <img class="banner-img" src="assets/bg-stadium.png" alt="" />
        <h1 class="logo">OFFSIDE<span>TRAP</span></h1>
      </div>
      <nav class="menu">
        <button class="px-btn px-btn--big" data-act="play" data-i18n="menu_play">▶ PLAY</button>
        <button class="px-btn" data-act="difficulty" data-i18n="menu_difficulty">DIFFICULTY</button>
        <button class="px-btn" data-act="rules" data-i18n="menu_guide">PLAYBOOK</button>
        <div class="menu-toggles">
          <button class="px-btn px-btn--ghost lang-toggle" data-act="lang" title="Language">RU</button>
          <button class="px-btn px-btn--ghost sound-toggle" data-act="sound" title="Sound">🔊 SOUND</button>
        </div>
      </nav>
      <p class="tagline" data-i18n="tagline">daily challenge · football minesweeper</p>
    </section>

    <!-- ════════ DIFFICULTY ════════ -->
    <section class="screen" id="screen-difficulty">
      <h2 class="screen-title" data-i18n="diff_title">DIFFICULTY</h2>
      <div class="cards" id="diff-cards"><!-- built from CONFIG.presets --></div>
      <button class="px-btn px-btn--ghost" data-act="to-title" data-i18n="back">◄ BACK</button>
    </section>

    <!-- ════════ GAME ════════ -->
    <section class="screen" id="screen-game">
      <header class="topbar">
        <button class="px-btn px-btn--icon" data-act="to-title" data-i18n-title="to_menu_title" title="Menu">☰</button>
        <h1 class="logo logo--sm">OFFSIDE<span>TRAP</span></h1>
        <div class="seed"><span data-i18n="board_label">board</span> <strong id="seed-val">—</strong></div>
      </header>

      <div class="hud">
        <div class="stat stat--saves" data-i18n-title="hud_saves" title="Saves">
          <img class="stat-ico" src="assets/artifact-save.png" alt="saves" />
          <span class="stat-num" id="saves-val">0</span>
        </div>
        <div class="scout" id="scout"><!-- keeper goal + defenders left + artifacts, built in JS --></div>
      </div>

      <div class="board-wrap" id="board-wrap">
      <div class="stage" id="stage">
        <canvas id="game"></canvas>
        <div class="pop-layer" id="pop-layer"></div>
        <div class="banner" id="banner">
          <div class="banner-box">
            <div class="banner-title" id="banner-title">GOAL!</div>
            <div class="banner-sub" id="banner-sub"></div>
            <div class="banner-actions">
              <button class="px-btn" id="banner-again" data-i18n="banner_again">↻ AGAIN</button>
              <button class="px-btn px-btn--ghost" data-act="to-title" data-i18n="banner_menu">☰ MENU</button>
            </div>
          </div>
        </div>
      </div>
      </div>

      <div class="controls">
        <button class="px-btn" id="btn-mark" aria-pressed="false" data-i18n="ctrl_mark" title="Cone">🚩 CONE</button>
        <button class="px-btn" id="btn-replay" data-i18n="ctrl_replay" title="Reset board">↻ RESET</button>
        <button class="px-btn" data-act="rules" data-i18n="ctrl_guide" title="Playbook">? PLAYBOOK</button>
        <button class="px-btn" id="btn-crt" aria-pressed="false" data-i18n="ctrl_crt" title="CRT overlay">📺 CRT</button>
        <button class="px-btn" id="btn-debug" aria-pressed="false" data-i18n="ctrl_debug" title="Reveal board">👁 DEBUG</button>
        <button class="px-btn sound-toggle" data-act="sound" aria-pressed="false" title="Sound">🔊 SOUND</button>
        <button class="px-btn px-btn--ghost lang-toggle" data-act="lang" title="Language">RU</button>
      </div>

      <p class="hint" id="hint" data-i18n="hint">
        Open cells next to the ball and read the numbers to find the safe path up to the keeper.
        A defender = caught. Long-press / right-click drops a cone.
      </p>
    </section>

    <!-- ════════ DOSSIER / GUIDE OVERLAY ════════ -->
    <div class="overlay" id="overlay-rules">
      <div class="overlay-box">
        <h2 class="screen-title" data-i18n="guide_title">PLAYBOOK</h2>
        <div class="guide-tabs" id="guide-tabs">
          <button class="guide-tab active" data-tab="rules" data-i18n="guide_tab_rules">HOW TO PLAY</button>
          <button class="guide-tab" data-tab="squad" data-i18n="guide_tab_squad">THE PITCH</button>
        </div>
        <ul class="rules" id="rules-list"><!-- built in JS with sprite icons --></ul>
        <div class="squad" id="squad-list" hidden><!-- built in JS --></div>
        <button class="px-btn px-btn--big" data-act="close-rules" data-i18n="guide_ok">GOT IT ▶</button>
      </div>
    </div>

  </div>

  <script src="js/config.js?v=20260623"></script>
  <script src="js/rng.js?v=20260623"></script>
  <script src="js/i18n.js?v=20260623"></script>
  <script src="js/game.js?v=20260623"></script>
  <script src="js/render.js?v=20260623"></script>
  <script src="js/sfx.js?v=20260623"></script>
  <script src="js/main.js?v=20260623"></script>
</body>
</html>
